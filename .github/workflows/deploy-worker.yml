name: Deploy Worker

on:
  push:
    branches:
      - master
      - staging
  workflow_dispatch:
    inputs:
      target:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-staging:
    if: >-
      (github.event_name == 'push' && github.ref_name == 'staging') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging
          environment: staging
          secrets: |
            READ_KEY
            STAGING_BASIC_AUTH
            UPLOAD_KEY
        env:
          READ_KEY: ${{ secrets.READ_KEY }}
          STAGING_BASIC_AUTH: ${{ secrets.STAGING_BASIC_AUTH }}
          UPLOAD_KEY: ${{ secrets.UPLOAD_KEY }}

      - name: Smoke test deployed Worker
        if: ${{ vars.WORKER_BASE_URL != '' }}
        env:
          SMOKE_BASIC_AUTH: ${{ secrets.STAGING_BASIC_AUTH }}
        run: bun run smoke:worker -- "${{ vars.WORKER_BASE_URL }}"

  deploy-production:
    if: >-
      (github.event_name == 'push' && github.ref_name == 'master') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          secrets: |
            READ_KEY
            UPLOAD_KEY
        env:
          READ_KEY: ${{ secrets.READ_KEY }}
          UPLOAD_KEY: ${{ secrets.UPLOAD_KEY }}

      - name: Smoke test deployed Worker
        if: ${{ vars.WORKER_BASE_URL != '' }}
        run: bun run smoke:worker -- "${{ vars.WORKER_BASE_URL }}"
