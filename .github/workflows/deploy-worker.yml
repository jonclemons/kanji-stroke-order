name: Deploy Worker

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            READ_KEY
            UPLOAD_KEY
        env:
          READ_KEY: ${{ secrets.READ_KEY }}
          UPLOAD_KEY: ${{ secrets.UPLOAD_KEY }}

      - name: Smoke test deployed Worker
        if: ${{ vars.WORKER_BASE_URL != '' }}
        run: bun run smoke:worker -- "${{ vars.WORKER_BASE_URL }}"
