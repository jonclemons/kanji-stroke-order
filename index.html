<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>かんじれんしゅう</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">
    <!-- Left sidebar: grade nav + kanji grid + input -->
    <aside class="sidebar">
      <h1>かんじれんしゅう</h1>

      <div class="grade-nav">
        <button class="grade-btn" data-grade="1">1年生</button>
        <button class="grade-btn" data-grade="2">2年生</button>
        <button class="grade-btn" data-grade="3">3年生</button>
        <button class="grade-btn" data-grade="4">4年生</button>
        <button class="grade-btn" data-grade="5">5年生</button>
        <button class="grade-btn" data-grade="6">6年生</button>
      </div>

      <div id="kanjiGrid" class="kanji-grid hidden"></div>

      <div class="input-section">
        <input type="text" id="kanjiInput" placeholder="漢字をいれてね" maxlength="1">
        <button id="lookupBtn">しらべる</button>
      </div>
      <div id="error" class="error"></div>
    </aside>

    <!-- Main content: kanji details -->
    <main class="main-content">
      <div id="results" class="results hidden">
        <div class="results-columns">
          <!-- Left: info, words, print -->
          <div class="results-left">
            <h2 id="kanjiTitle" class="kanji-title"></h2>

            <div class="section">
              <h3>よみかた</h3>
              <div id="readings" class="readings"></div>
            </div>

            <div class="section">
              <h3>この漢字をつかうことば</h3>
              <div id="words" class="words-list"></div>
            </div>

            <div class="section">
              <h3>れんしゅうシート</h3>
              <div class="practice-options">
                <button id="printBtn">いんさつ</button>
              </div>
            </div>
          </div>

          <!-- Right: stroke order + animation stacked -->
          <div class="results-right">
            <div class="section">
              <h3>アニメーション</h3>
              <div class="animation-container">
                <div id="animationCanvas" class="animation-canvas"></div>
                <div class="animation-controls">
                  <button id="playBtn" class="anim-btn" title="さいせい">⏸</button>
                  <button id="resetBtn" class="anim-btn" title="もどす">↺</button>
                </div>
              </div>
            </div>

            <div class="section">
              <h3>かきじゅん</h3>
              <div id="steps" class="steps-grid"></div>
            </div>
          </div>
        </div>
      </div>

      <div id="emptyState" class="empty-state">
        <p>← 学年をえらんで、漢字をクリックしてね</p>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
